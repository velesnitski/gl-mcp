# PHP / Laravel rules

[[rule]]
id = "PHP001"
severity = "critical"
name = "SQL injection risk"
pattern = '(->whereRaw|->selectRaw|->havingRaw|DB::raw)\s*\([^)]*\$'
message = "Raw SQL with variable interpolation — use parameterized queries"

[[rule]]
id = "PHP002"
severity = "critical"
name = "dd() left in code"
pattern = '\bdd\s*\('
message = "Debug dd() call left in production code"

[[rule]]
id = "PHP003"
severity = "critical"
name = "dump() left in code"
pattern = '\bdump\s*\('
message = "Debug dump() call left in production code"

[[rule]]
id = "PHP004"
severity = "warning"
name = "var_dump left in code"
pattern = '\bvar_dump\s*\('
message = "Debug var_dump() left in code"

[[rule]]
id = "PHP005"
severity = "warning"
name = "print_r left in code"
pattern = '\bprint_r\s*\('
message = "Debug print_r() left in code"

[[rule]]
id = "PHP006"
severity = "warning"
name = "env() outside config"
pattern = '\benv\s*\('
negative_file_pattern = 'config/'
message = "env() should only be used in config files — use config() helper elsewhere"

[[rule]]
id = "PHP007"
severity = "info"
name = "Missing return type"
pattern = '(public|protected|private)\s+function\s+\w+\s*\([^)]*\)\s*\{'
negative_pattern = '(public|protected|private)\s+function\s+\w+\s*\([^)]*\)\s*:\s*\S+'
message = "Function without return type declaration"

[[rule]]
id = "PHP008"
severity = "warning"
name = "Catch-all exception"
pattern = 'catch\s*\(\s*(\\\\)?Exception\s+\$'
message = "Catching generic Exception — use specific exception types"

[[rule]]
id = "PHP009"
severity = "critical"
name = "Unvalidated request input"
pattern = '\$request\s*->\s*(input|get|post)\s*\([^)]*\)\s*(?!.*validate)'
message = "Using raw request input — validate or sanitize first"

[[rule]]
id = "PHP010"
severity = "warning"
name = "Sleep in production code"
pattern = '\bsleep\s*\(\s*\d+'
message = "sleep() in production code — use queue/job instead"

[[rule]]
id = "PHP011"
severity = "info"
name = "Magic number"
pattern = '(?<!=\s)(?<!\$)\b(?!0\b|1\b|2\b|100\b|200\b|301\b|302\b|400\b|401\b|403\b|404\b|422\b|500\b)\d{3,}\b(?!\s*[=;])'
message = "Magic number — consider using a named constant"

[[rule]]
id = "PHP012"
severity = "warning"
name = "No newline at EOF"
applies_to = "file_end"
pattern = '\\No newline at end of file'
message = "Missing newline at end of file (PSR-12)"

[[rule]]
id = "PHP013"
severity = "info"
name = "Commented-out code"
pattern = '^\s*//\s*\$\w+.*[;={]|^\s*//\s*(return|if|foreach|while|class|function|public|private|protected)\b'
message = "Commented-out code — remove or use version control"

[[rule]]
id = "PHP014"
severity = "info"
name = "TODO without ticket"
pattern = '//\s*TODO(?!.*\b[A-Z]+-\d+)'
message = "TODO without issue reference — add ticket ID"

[[rule]]
id = "PHP015"
severity = "warning"
name = "Too many parameters"
pattern = 'function\s+\w+\s*\([^)]*,\s*[^)]*,\s*[^)]*,\s*[^)]*,\s*[^)]*,'
message = "Function has 5+ parameters — use a DTO or config object"

[[rule]]
id = "PHP016"
severity = "warning"
name = "God class indicator"
pattern = '^\s*(use\s+[A-Z])'
applies_to = "line"
message = "Check import count — many imports may indicate a god class"

[[rule]]
id = "PHP017"
severity = "warning"
name = "Nested ternary"
pattern = '\?[^:]+\?[^:]+:'
message = "Nested ternary — use if/else or match expression for clarity"

[[rule]]
id = "PHP018"
severity = "warning"
name = "Array push in loop"
pattern = '\$\w+\[\]\s*=.*;\s*$'
negative_pattern = '(array_map|array_filter|collect|->map)'
message = "Consider array_map/array_filter or collection methods instead of manual loop"

[[rule]]
id = "PHP019"
severity = "warning"
name = "Empty string comparison"
pattern = "(?:===?|!==?)\\s*['\"]['\"]|['\"]['\"]\\s*(?:===?|!==?)"
negative_pattern = 'empty\('
message = "Use empty() instead of comparing to empty string"

[[rule]]
id = "PHP020"
severity = "info"
name = "Long method"
applies_to = "file_stats"
max_additions = 200
message = "Large change — check that individual methods stay under 30 lines"
